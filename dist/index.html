<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQLD CBT</title>
<style>
:root {
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 72px;
  --r-1: 4px;  --r-2: 8px;  --r-3: 12px;
  --t-fast: 160ms cubic-bezier(.22,1,.36,1);
  --t-mid:  220ms cubic-bezier(.22,1,.36,1);
}
[data-theme="dark"] {
  --bg:           oklch(0.18 0.010 240);
  --surface:      oklch(0.22 0.012 240);
  --surface-2:    oklch(0.26 0.014 240);
  --border:       oklch(0.34 0.015 240);
  --border-strong:oklch(0.42 0.018 240);
  --text:         oklch(0.96 0.005 240);
  --text-sub:     oklch(0.74 0.010 240);
  --text-mute:    oklch(0.56 0.012 240);
  --accent:       oklch(0.78 0.10 220);
  --accent-mute:  oklch(0.34 0.06 220);
  --ok-bg:        oklch(0.32 0.08 150 / .35);
  --ok-border:    oklch(0.62 0.14 150);
  --ok-text:      oklch(0.86 0.14 150);
  --bad-bg:       oklch(0.32 0.10 25 / .35);
  --bad-border:   oklch(0.62 0.18 25);
  --bad-text:     oklch(0.82 0.14 25);
  --warn:         oklch(0.78 0.14 75);
  --warn-strong:  oklch(0.66 0.20 25);
  --bookmark:     oklch(0.84 0.13 85);
  --null:         oklch(0.58 0.012 240);
  --on-accent:    oklch(0.18 0.010 240);
  color-scheme: dark;
}
[data-theme="light"] {
  --bg:           oklch(0.985 0.003 240);
  --surface:      oklch(0.965 0.005 240);
  --surface-2:    oklch(0.93 0.006 240);
  --border:       oklch(0.86 0.008 240);
  --border-strong:oklch(0.78 0.010 240);
  --text:         oklch(0.20 0.012 240);
  --text-sub:     oklch(0.42 0.012 240);
  --text-mute:    oklch(0.56 0.010 240);
  --accent:       oklch(0.50 0.13 220);
  --accent-mute:  oklch(0.92 0.04 220);
  --ok-bg:        oklch(0.94 0.05 150 / .85);
  --ok-border:    oklch(0.55 0.14 150);
  --ok-text:      oklch(0.34 0.14 150);
  --bad-bg:       oklch(0.96 0.04 25 / .85);
  --bad-border:   oklch(0.55 0.18 25);
  --bad-text:     oklch(0.40 0.18 25);
  --warn:         oklch(0.55 0.16 75);
  --warn-strong:  oklch(0.45 0.22 25);
  --bookmark:     oklch(0.55 0.16 80);
  --null:         oklch(0.62 0.010 240);
  --on-accent:    oklch(0.985 0.003 240);
  color-scheme: light;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
html.font-sm { font-size: 14px; }
html.font-lg { font-size: 18px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
               "Segoe UI", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 1rem;
  line-height: 1.6;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  transition: background var(--t-mid), color var(--t-mid);
  min-height: 100vh;
}
.mono, code, pre, .data-table td, .num-mono {
  font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  font-variant-numeric: tabular-nums;
}

.app { max-width: 1400px; margin: 0 auto; padding: var(--s-5); }
.screen { display: none; }
.screen.active { display: block; }

/* ───────── 공통 버튼 ───────── */
.btn {
  all: unset; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  gap: var(--s-2);
  padding: 10px 18px;
  font-size: 0.875rem; font-weight: 600;
  border-radius: var(--r-2);
  text-align: center;
  transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
  border: 1px solid transparent;
}
.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { background: var(--accent); color: var(--on-accent); }
.btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { border-color: var(--border-strong); }
.btn-ghost { background: transparent; color: var(--text-sub); }
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.btn-lg { padding: 14px 24px; font-size: 0.95rem; }

/* ───────── HOME ───────── */
.home-wrap { max-width: 960px; margin: var(--s-7) auto; }
.home-head { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--s-5); margin-bottom: var(--s-5); }
.home-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: var(--s-2); }
.home-sub { font-size: 0.875rem; color: var(--text-sub); }

/* 우상단 테마 토글 (Dark/Light 라벨) */
.theme-toggle {
  display: inline-flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  padding: 4px;
  gap: 2px;
}
.theme-toggle button {
  all: unset; cursor: pointer;
  padding: 6px 14px;
  font-size: 0.8125rem;
  color: var(--text-sub);
  border-radius: 6px;
  transition: background var(--t-fast), color var(--t-fast);
}
.theme-toggle button.on { background: var(--surface-2); color: var(--text); font-weight: 600; }
.theme-toggle button:hover:not(.on) { color: var(--text); }
.home-spec {
  font-size: 0.8125rem; color: var(--text-sub);
  padding: var(--s-3) var(--s-4);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  margin-bottom: var(--s-5);
  white-space: nowrap;
  overflow-x: auto;
}
@media (max-width: 720px) {
  .home-spec { white-space: normal; font-size: 0.75rem; line-height: 1.6; }
}
.home-spec b { color: var(--text); font-weight: 600; }
.mode-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-3); overflow: hidden; }
.mode-row {
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: 0;
  margin: 0;
  font: inherit;
  color: inherit;
  text-align: left;
  cursor: pointer;
  box-sizing: border-box;
  width: 100%;
  position: relative;
  display: grid;
  grid-template-columns: 1fr 28px;
  column-gap: var(--s-5);
  align-items: center;
  padding: var(--s-4) var(--s-5);
  min-height: 76px;
  border-top: 1px solid var(--border);
  overflow: hidden;
  transition: background var(--t-fast);
}
.mode-row:first-child { border-top: none; }
.mode-row:hover:not([disabled]) { background: var(--surface-2); }
.mode-row:hover:not([disabled]) .arrow { animation: arrow-dash 520ms cubic-bezier(.22,1,.36,1); color: var(--text); }
.mode-row[disabled] { cursor: not-allowed; opacity: 0.45; }

@keyframes arrow-dash {
  0%   { transform: translateX(0); opacity: 1; }
  40%  { transform: translateX(14px); opacity: 0; }
  41%  { transform: translateX(-10px); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}

.mode-row > .meta { min-width: 0; }
.mode-row .name { font-size: 1rem; font-weight: 600; color: var(--text); display: inline-flex; align-items: center; gap: var(--s-2); }
.mode-row .desc { font-size: 0.8125rem; color: var(--text-mute); margin-top: 4px; line-height: 1.5; }
.mode-row .arrow {
  color: var(--text-mute);
  font-size: 1.125rem;
  justify-self: end;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  transition: color var(--t-fast);
}
.mode-row.primary .name::after {
  content: "기본";
  padding: 2px 8px;
  background: var(--accent-mute);
  color: var(--accent);
  border-radius: var(--r-1);
  font-size: 0.625rem;
  letter-spacing: 0.06em;
  font-weight: 600;
}

.home-tools { display: flex; justify-content: space-between; align-items: center; margin-top: var(--s-5); }
.home-tools .left { display: flex; gap: var(--s-2); }
.home-tools .right { font-size: 0.75rem; color: var(--text-mute); }

/* 토픽 선택 패널 */
.topic-panel { margin-top: var(--s-4); padding: var(--s-4) var(--s-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-3); display: none; }
.topic-panel.open { display: block; }
.topic-panel h4 { font-size: 0.75rem; color: var(--text-mute); letter-spacing: 0.06em; text-transform: uppercase; margin: var(--s-3) 0 var(--s-2); font-weight: 600; }
.topic-panel h4:first-child { margin-top: 0; }
.topic-chips { display: flex; flex-wrap: wrap; gap: var(--s-2); }
.chip {
  all: unset; cursor: pointer;
  padding: 6px 12px;
  font-size: 0.8125rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  color: var(--text-sub);
  transition: all var(--t-fast);
}
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip.on { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
.topic-actions { display: flex; align-items: center; gap: var(--s-3); margin-top: var(--s-4); padding-top: var(--s-4); border-top: 1px solid var(--border); }
.topic-actions select { font-family: inherit; font-size: 0.875rem; padding: 6px 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--r-1); }

/* ───────── QUIZ 상단바 ───────── */
.topbar {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items: center;
  gap: var(--s-5);
  padding: var(--s-3) var(--s-5);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
}
.subj-tag { font-size: 0.75rem; color: var(--text-sub); letter-spacing: 0.04em; }
.subj-tag b { color: var(--text); font-weight: 600; }
.progress-line { display: flex; align-items: center; gap: var(--s-3); }
.progress-track { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; min-width: 160px; }
.progress-fill { height: 100%; width: 0; background: var(--accent); transition: width var(--t-mid); }
.progress-count { font-size: 0.8125rem; color: var(--text-sub); white-space: nowrap; }
.progress-count b { color: var(--text); font-weight: 600; }
.timer { font-size: 1.125rem; font-weight: 600; letter-spacing: 0.02em; color: var(--text); }
.timer.warn { color: var(--warn); }
.timer.danger { color: var(--warn-strong); }
.rate { font-size: 0.8125rem; color: var(--text-sub); }
.rate b { color: var(--text); font-weight: 600; }
.tools { display: flex; gap: var(--s-1); }
.tool-btn {
  all: unset; cursor: pointer;
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-1);
  color: var(--text-sub);
  font-size: 0.875rem;
  transition: background var(--t-fast), color var(--t-fast);
}
.tool-btn:hover { background: var(--surface-2); color: var(--text); }
.tool-btn.active { color: var(--bookmark); }
.tool-btn[disabled] { opacity: 0.4; cursor: default; }

/* ───────── QUIZ 본문 ───────── */
.quiz-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: var(--s-5);
  margin-top: var(--s-5);
  align-items: start;
}
@media (max-width: 1023px) {
  .quiz-layout { grid-template-columns: 1fr; }
  .answer-panel { position: static !important; }
}

.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  padding: var(--s-6);
}
.q-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--s-4); gap: var(--s-3); }
.topic-tag { font-size: 0.6875rem; color: var(--text-mute); letter-spacing: 0.06em; text-transform: uppercase; }
.q-num { font-size: 0.75rem; color: var(--text-mute); }
.q-num b { color: var(--text-sub); font-weight: 600; }
.q-body { font-size: 1rem; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: keep-all; }

.blocks { margin: var(--s-5) 0; display: flex; flex-direction: column; gap: var(--s-4); }
.block-title { font-size: 0.75rem; color: var(--text-sub); margin-bottom: var(--s-2); font-weight: 600; letter-spacing: 0.02em; }

.data-table-wrap { overflow-x: auto; }
.data-table {
  border-collapse: collapse;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  overflow: hidden;
  font-size: 0.875rem;
  min-width: 100%;
}
.data-table th {
  text-align: left;
  padding: 10px 14px;
  background: var(--surface-2);
  color: var(--text-sub);
  font-weight: 600;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.data-table td {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  color: var(--text);
}
.data-table tbody tr:first-child td { border-top: none; }
.null-val { color: var(--null); font-style: italic; }

.code-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  padding: var(--s-4) var(--s-5);
  font-size: 0.85rem;
  line-height: 1.7;
  overflow-x: auto;
  white-space: pre;
  color: var(--text);
}
.sql-kw { color: var(--accent); font-weight: 600; }
.sql-str { color: var(--ok-text); }
.sql-num { color: var(--bookmark); }
.sql-cmt { color: var(--text-mute); font-style: italic; }
.sql-blank { background: oklch(0.78 0.14 75 / .22); color: var(--warn); padding: 1px 6px; border-radius: 4px; font-weight: 600; }

.choices { display: flex; flex-direction: column; gap: var(--s-2); margin-top: var(--s-5); }
.choice {
  all: unset; cursor: pointer;
  display: grid; grid-template-columns: 28px 1fr; gap: var(--s-3);
  align-items: start;
  padding: 14px var(--s-4);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  font-size: 0.9375rem;
  line-height: 1.5;
  color: var(--text);
  transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
}
.choice:hover:not(.locked) { border-color: var(--border-strong); background: var(--surface); }
.choice .num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  font-size: 0.75rem;
  color: var(--text-sub);
  font-weight: 600;
  transition: all var(--t-fast);
}
.choice.correct {
  background: var(--ok-bg);
  border-color: var(--ok-border);
  color: var(--text);
}
.choice.correct .num {
  background: var(--ok-border); border-color: var(--ok-border); color: var(--bg);
}
.choice.wrong {
  background: var(--bad-bg);
  border-color: var(--bad-border);
  color: var(--text);
}
.choice.wrong .num {
  background: var(--bad-border); border-color: var(--bad-border); color: var(--bg);
}
.choice.locked { cursor: default; }
.choice.dim { opacity: 0.7; }
.your-pick { font-size: 0.75rem; color: var(--text-mute); margin-left: var(--s-2); font-weight: 500; }

/* 4단 해설 */
.explain {
  margin-top: var(--s-5);
  padding-top: var(--s-5);
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column;
  gap: var(--s-4);
}
.exp-row { display: grid; grid-template-columns: 92px 1fr; gap: var(--s-4); align-items: start; }
@media (max-width: 600px) { .exp-row { grid-template-columns: 1fr; gap: var(--s-1); } }
.exp-label {
  font-size: 0.75rem;
  color: var(--text-sub);
  font-weight: 600;
  letter-spacing: 0.04em;
  padding-top: 2px;
}
.exp-body { font-size: 0.9rem; line-height: 1.7; color: var(--text); }
.exp-body ul { padding-left: 1em; }
.exp-body ul li { margin-bottom: 4px; color: var(--text-sub); }
.exp-body b { color: var(--text); font-weight: 600; }
.exp-source { font-size: 0.75rem; color: var(--text-mute); margin-top: var(--s-2); }

/* QUIZ 하단 네비 */
.q-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: var(--s-5);
  padding-top: var(--s-5);
  border-top: 1px solid var(--border);
}
.q-nav .right { display: flex; gap: var(--s-2); }

/* 답안지 사이드 패널 */
.answer-panel {
  position: sticky;
  top: var(--s-4);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  padding: var(--s-4);
}
.answer-panel h3 {
  font-size: 0.75rem;
  color: var(--text-sub);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: var(--s-3);
  padding: 0 var(--s-1);
}
.grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.cell {
  all: unset; cursor: pointer;
  aspect-ratio: 1;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  border-radius: var(--r-1);
  font-size: 0.75rem;
  color: var(--text-mute);
  font-variant-numeric: tabular-nums;
  transition: all var(--t-fast);
}
.cell:hover { border-color: var(--border-strong); color: var(--text); }
.cell.answered { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
.cell.current { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
.cell.bookmark { box-shadow: inset 0 0 0 2px var(--bookmark); }
.cell.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-text); font-weight: 600; }
.cell.no { background: var(--bad-bg); border-color: var(--bad-border); color: var(--bad-text); font-weight: 600; }
.cell.miss { background: transparent; color: var(--text-mute); border-color: var(--border); }
.cell.current.ok, .cell.current.no, .cell.current.miss {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}
.legend {
  display: flex; flex-wrap: wrap; gap: var(--s-3);
  margin-top: var(--s-4); padding-top: var(--s-3);
  border-top: 1px solid var(--border);
  font-size: 0.6875rem; color: var(--text-mute);
}
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend i {
  width: 10px; height: 10px;
  border-radius: 2px;
  border: 1px solid var(--border-strong);
  display: inline-block;
}
.legend i.a { background: var(--surface-2); }
.legend i.c { background: var(--accent); border-color: var(--accent); }
.legend i.ok { background: var(--ok-bg); border-color: var(--ok-border); }
.legend i.no { background: var(--bad-bg); border-color: var(--bad-border); }

/* 답안지 모바일 토글 */
.answer-toggle-m { display: none; margin: var(--s-4) 0 0; }
@media (min-width: 1024px) {
  /* 데스크톱: 답안지가 항상 보이므로 ▦ 토글 버튼 숨김 */
  #grid-btn { display: none; }
}
@media (max-width: 1023px) {
  .answer-toggle-m { display: block; }
  .answer-panel { display: none; }
  .answer-panel.open { display: block; }
}

/* ───────── RESULT ───────── */
.result-wrap { max-width: 880px; margin: var(--s-7) auto; }
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  padding: var(--s-7) var(--s-6);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: var(--s-7);
  align-items: center;
}
@media (max-width: 720px) {
  .result-card { grid-template-columns: 1fr; gap: var(--s-5); padding: var(--s-5); text-align: left; }
}
.score-num { font-size: 4rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1; color: var(--text); }
.score-label { font-size: 0.75rem; color: var(--text-mute); letter-spacing: 0.08em; text-transform: uppercase; margin-top: var(--s-2); }
.pass-tag {
  display: inline-block; margin-top: var(--s-3);
  padding: 4px 12px;
  border-radius: var(--r-1);
  font-size: 0.8125rem; font-weight: 600;
  border: 1px solid;
}
.pass-tag.ok { background: var(--ok-bg); color: var(--ok-text); border-color: var(--ok-border); }
.pass-tag.no { background: var(--bad-bg); color: var(--bad-text); border-color: var(--bad-border); }
.subj-scores { display: flex; flex-direction: column; }
.subj-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: var(--s-4);
  align-items: baseline;
  padding: var(--s-3) 0;
  border-bottom: 1px solid var(--border);
}
.subj-row:last-child { border-bottom: none; }
.subj-row .lbl { font-size: 0.8125rem; color: var(--text-sub); }
.subj-row .frac { font-size: 1.125rem; font-weight: 600; }
.subj-row .pct { font-size: 0.75rem; color: var(--text-mute); min-width: 56px; text-align: right; }
.subj-row.fail .frac, .subj-row.fail .pct { color: var(--bad-text); }
.result-actions { display: flex; flex-direction: column; gap: var(--s-2); min-width: 160px; }

.result-grid-section { margin-top: var(--s-6); padding: var(--s-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-3); }
.result-grid-section h3 { font-size: 0.75rem; color: var(--text-sub); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: var(--s-4); }
.result-grid-section .grid-50 { max-width: 480px; margin: 0 auto; }

/* ───────── REVIEW ───────── */
.review-wrap { max-width: 980px; margin: var(--s-5) auto; }
.review-head-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--s-3) var(--s-4);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  margin-bottom: var(--s-4);
  position: sticky; top: var(--s-2); z-index: 5;
}
.review-head-bar .title { font-size: 0.875rem; font-weight: 600; }
.review-head-bar .filters { display: flex; gap: var(--s-1); }
.filter-btn {
  all: unset; cursor: pointer;
  padding: 6px 12px;
  font-size: 0.8125rem;
  border-radius: var(--r-1);
  color: var(--text-sub);
  transition: all var(--t-fast);
}
.filter-btn:hover { background: var(--surface-2); color: var(--text); }
.filter-btn.on { background: var(--surface-2); color: var(--text); }

.review-list { display: flex; flex-direction: column; gap: var(--s-4); }
.review-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  padding: var(--s-5) var(--s-6);
}
.review-item.no { border-color: var(--bad-border); }
.review-item.ok { border-color: var(--border); }
.review-head {

.review-head .num { font-size: 0.8125rem; color: var(--text-mute); }
.review-head .topic { font-size: 0.6875rem; color: var(--text-mute); letter-spacing: 0.06em; text-transform: uppercase; }

/* ───────── 토스트 / 빈 상태 ───────── */

<script>
'use strict';

/* ════════════ 상태 ════════════ */
const STORAGE = {
  theme: 'sqld_theme',
  font: 'sqld_font_size',
  bookmarks: 'sqld_bookmarks',
  wrongNotes: 'sqld_wrong_notes',
  lastResult: 'sqld_last_result',
  stats: 'sqld_stats',
};

let state = {
  mode: null,           // 'exam' | 'topic' | 'bookmark' | 'wrong'
  exam: [],             // 현재 시험에 사용 중인 문항 배열 (보기 셔플 적용 후)
  idx: 0,
  answered: [],         // [{ selected: 1~4 | null, correct: bool }]
  startTime: 0,
  durationSec: 0,
  timerId: null,
  ended: false,
  isExamMode: false,    // true면 결과/리뷰에서 과목별 점수 계산
  reviewFilter: 'all',
};

/* ════════════ localStorage 헬퍼 ════════════ */
function loadSet(key) {
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
  catch { return new Set(); }
}
function saveSet(key, set) {
  localStorage.setItem(key, JSON.stringify([...set]));
}
function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveJSON(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

let bookmarks = loadSet(STORAGE.bookmarks);
let wrongNotes = loadSet(STORAGE.wrongNotes);

/* ════════════ 데이터 정규화 ════════════ */
// wrong 배열을 보기 텍스트로 매핑해 셔플에 무관하게.
// 기존 데이터: exp.wrong = ["1. 텍스트", "3. 텍스트", "4. 텍스트"] (정답 위치는 빠짐)
// 변환: exp.wrongMap = { [choices[i]]: "텍스트" } — 정답이 아닌 보기에 대해서만.
function normalizeBank() {
  if (!Array.isArray(window.QUESTION_BANK)) {
    console.error('QUESTION_BANK not loaded');
    return;
  }
  window.QUESTION_BANK.forEach(q => {
    if (q.exp && Array.isArray(q.exp.wrong) && !q.exp.wrongMap) {
      const map = {};
      q.exp.wrong.forEach(line => {
        const m = String(line).match(/^\s*(\d+)\.\s*(.*)$/);
        if (m) {
          const pos = parseInt(m[1], 10);
          const text = m[2];
          if (q.choices[pos - 1] !== undefined) {
            map[q.choices[pos - 1]] = text;
          }
        }
      });
      q.exp.wrongMap = map;
    }
    if (q.choices && q.choices.length === 4 && (typeof q.ans !== 'number' || q.ans < 1 || q.ans > 4)) {
      q.ans = 1;
    }
  });
}
normalizeBank();

/* ════════════ 시험 빌드 ════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleChoices(q) {
  const indexed = q.choices.map((c, i) => ({ text: c, isAns: i === q.ans - 1 }));
  const shuf = shuffle(indexed);
  return {
    ...q,
    choices: shuf.map(x => x.text),
    ans: shuf.findIndex(x => x.isAns) + 1,
  };
}

function balanceAnswerDistribution(qs) {
  if (qs.length < 4) return;
  const MIN = Math.floor(qs.length / 4) - 1;
  const MAX = Math.ceil(qs.length / 4) + 1;
  let safety = 0;
  while (safety < qs.length * 2) {
    const dist = [0, 0, 0, 0];
    qs.forEach(q => dist[q.ans - 1]++);
    const max = Math.max(...dist), min = Math.min(...dist);
    if (max <= MAX && min >= MIN) break;
    const fromIdx = dist.indexOf(max);
    const toIdx = dist.indexOf(min);
    const target = qs.find(q => q.ans - 1 === fromIdx);
    if (!target) break;
    const ansChoice = target.choices[fromIdx];
    const others = target.choices.filter((_, i) => i !== fromIdx);
    target.choices = [
      ...others.slice(0, toIdx),
      ansChoice,
      ...others.slice(toIdx),
    ];
    target.ans = toIdx + 1;
    safety++;
  }
}

function buildExam() {
  const pool1 = window.QUESTION_BANK.filter(q => q.subj === 1);
  const pool2 = window.QUESTION_BANK.filter(q => q.subj === 2);
  const picked1 = shuffle(pool1).slice(0, Math.min(10, pool1.length));
  const picked2 = shuffle(pool2).slice(0, Math.min(40, pool2.length));
  let exam = [...picked1, ...picked2].map(shuffleChoices);
  balanceAnswerDistribution(exam);
  return shuffle(exam);
}

function buildTopic(topicCodes, count) {
  const pool = window.QUESTION_BANK.filter(q => topicCodes.has(q.topic));
  const exam = shuffle(pool).slice(0, Math.min(count, pool.length)).map(shuffleChoices);
  balanceAnswerDistribution(exam);
  return exam;
}

function buildBookmark() {
  const pool = window.QUESTION_BANK.filter(q => bookmarks.has(q.id));
  return shuffle(pool).map(shuffleChoices);
}

function buildWrong() {
  const pool = window.QUESTION_BANK.filter(q => wrongNotes.has(q.id));
  return shuffle(pool).map(shuffleChoices);
}

/* ════════════ 화면 전환 ════════════ */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === name));
  window.scrollTo(0, 0);
}

/* ════════════ HOME ════════════ */
function renderHome() {
  // 북마크 / 오답 카운트
  const bmCount = bookmarks.size;
  const wrCount = wrongNotes.size;
  document.getElementById('bookmark-desc').textContent =
    bmCount > 0 ? `별표한 ${bmCount}문항 풀기.` : '아직 북마크한 문항이 없습니다.';
  document.getElementById('wrong-desc').textContent =
    wrCount > 0 ? `최근에 틀린 ${wrCount}문항 다시 풀기.` : '아직 틀린 문항이 없습니다.';
  document.getElementById('mode-bookmark').toggleAttribute('disabled', bmCount === 0);
  document.getElementById('mode-wrong').toggleAttribute('disabled', wrCount === 0);

  renderTopicChips();
}

let selectedTopics = new Set();

function renderTopicChips() {
  const map1 = new Map();
  const map2 = new Map();
  window.QUESTION_BANK.forEach(q => {
    const m = q.subj === 1 ? map1 : map2;
    if (!m.has(q.topic)) m.set(q.topic, { name: q.topic_name, count: 0 });
    m.get(q.topic).count++;
  });
  const render = (m, container) => {
    container.innerHTML = [...m.entries()]
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([code, info]) =>
        `<button class="chip ${selectedTopics.has(code) ? 'on' : ''}" data-topic="${code}">${info.name} <span style="opacity:.6;">${info.count}</span></button>`
      ).join('');
  };
  render(map1, document.getElementById('topic-chips-1'));
  render(map2, document.getElementById('topic-chips-2'));
  updateTopicSummary();
}

function updateTopicSummary() {
  const total = window.QUESTION_BANK.filter(q => selectedTopics.has(q.topic)).length;
  document.getElementById('topic-summary').textContent =
    selectedTopics.size > 0 ? `선택 ${selectedTopics.size}개 영역 / 풀 ${total}문항` : '';
}

document.getElementById('topic-chips-1').addEventListener('click', e => toggleTopic(e));
document.getElementById('topic-chips-2').addEventListener('click', e => toggleTopic(e));
function toggleTopic(e) {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  const code = btn.dataset.topic;
  if (selectedTopics.has(code)) selectedTopics.delete(code);
  else selectedTopics.add(code);
  btn.classList.toggle('on');
  updateTopicSummary();
}

document.getElementById('topic-clear').addEventListener('click', () => {
  selectedTopics.clear();
  renderTopicChips();
});

document.getElementById('topic-start').addEventListener('click', () => {
  if (selectedTopics.size === 0) { toast('영역을 하나 이상 선택하십시오'); return; }
  const count = parseInt(document.getElementById('topic-count').value, 10);
  const exam = buildTopic(selectedTopics, count);
  if (exam.length === 0) { toast('해당 영역에 문항이 없습니다'); return; }
  startSession({ mode: 'topic', exam, isExamMode: false, durationSec: 0 });
});

document.querySelectorAll('.mode-row').forEach(row => {
  row.addEventListener('click', () => {
    if (row.hasAttribute('disabled')) return;
    const mode = row.dataset.mode;
    if (mode === 'exam') {
      const exam = buildExam();
      if (exam.length < 50) { toast('문제은행이 부족합니다'); return; }
      startSession({ mode: 'exam', exam, isExamMode: true, durationSec: 90 * 60 });
    } else if (mode === 'topic') {
      document.getElementById('topic-panel').classList.toggle('open');
    } else if (mode === 'bookmark') {
      const exam = buildBookmark();
      if (exam.length === 0) { toast('북마크가 없습니다'); return; }
      startSession({ mode: 'bookmark', exam, isExamMode: false, durationSec: 0 });
    } else if (mode === 'wrong') {
      const exam = buildWrong();
      if (exam.length === 0) { toast('오답 노트가 없습니다'); return; }
      startSession({ mode: 'wrong', exam, isExamMode: false, durationSec: 0 });
    }
  });
});

/* ════════════ 세션 시작 ════════════ */
function startSession({ mode, exam, isExamMode, durationSec }) {
  state.mode = mode;
  state.exam = exam;
  state.idx = 0;
  state.answered = exam.map(() => null);
  state.startTime = Date.now();
  state.durationSec = durationSec;
  state.ended = false;
  state.isExamMode = isExamMode;
  document.getElementById('progress-total').textContent = exam.length;
  if (durationSec > 0) {
    startTimer();
  } else {
    document.getElementById('timer').textContent = '∞';
    document.getElementById('timer').classList.remove('warn', 'danger');
  }
  renderQuiz();
  renderGrid();
  showScreen('quiz');
}

/* ════════════ 타이머 ════════════ */
function startTimer() {
  if (state.timerId) clearInterval(state.timerId);
  const tick = () => {
    if (state.ended) return;
    const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const left = state.durationSec - elapsed;
    if (left <= 0) {
      document.getElementById('timer').textContent = '00:00';
      finishExam(true);
      return;
    }
    const h = Math.floor(left / 3600);
    const m = Math.floor((left % 3600) / 60);
    const s = left % 60;
    const txt = h > 0
      ? `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
      : `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    const el = document.getElementById('timer');
    el.textContent = txt;
    el.classList.toggle('warn', left <= 600 && left > 180);
    el.classList.toggle('danger', left <= 180);
  };
  tick();
  state.timerId = setInterval(tick, 250);
}

function stopTimer() {
  if (state.timerId) clearInterval(state.timerId);
  state.timerId = null;
}

/* ════════════ QUIZ 렌더링 ════════════ */
function renderQuiz() {
  const q = state.exam[state.idx];
  const a = state.answered[state.idx];
  const subjLabel = q.subj === 1 ? '1과목 데이터 모델링' : '2과목 SQL 활용';
  document.getElementById('subj-tag').innerHTML = `<b>${q.subj}과목</b> ${subjLabel.split(' ').slice(1).join(' ')}`;
  document.getElementById('progress-cur').textContent = state.idx + 1;
  document.getElementById('progress-fill').style.width = `${((state.idx + 1) / state.exam.length) * 100}%`;
  updateRate();
  updateBookmarkBtn();

  const card = document.getElementById('q-card');
  card.innerHTML = '';

  const meta = el('div', 'q-meta');
  meta.appendChild(el('div', 'topic-tag', q.topic_name || ''));
  const num = el('div', 'q-num');
  num.innerHTML = `<b>문제 ${state.idx + 1}</b> / ${state.exam.length}`;
  meta.appendChild(num);
  card.appendChild(meta);

  const body = el('div', 'q-body', q.q || '');
  card.appendChild(body);

  if (q.blocks && q.blocks.length) {
    const wrap = el('div', 'blocks');
    q.blocks.forEach(b => {
      const blockEl = el('div', '');
      if (b.title) {
        blockEl.appendChild(el('div', 'block-title', b.title));
      }
      if (b.type === 'table') {
        blockEl.appendChild(renderTable(b));
      } else if (b.type === 'code') {
        blockEl.appendChild(renderCode(b));
      }
      wrap.appendChild(blockEl);
    });
    card.appendChild(wrap);
  }

  // 보기
  const choicesWrap = el('div', 'choices');
  q.choices.forEach((text, i) => {
    const num = i + 1;
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.dataset.idx = i;

    const numEl = el('span', 'num', String(num));
    const txtEl = el('span', '', text);
    btn.appendChild(numEl);
    btn.appendChild(txtEl);

    if (a) {
      btn.classList.add('locked');
      const isAns = num === q.ans;
      const isPicked = num === a.selected;
      if (isAns) btn.classList.add('correct');
      else if (isPicked) btn.classList.add('wrong');
      else btn.classList.add('dim');
      if (isPicked && !isAns) {
        const tag = document.createElement('span');
        tag.className = 'your-pick';
        tag.textContent = '내 답';
        txtEl.appendChild(tag);
      }
    } else {
      btn.addEventListener('click', () => selectAnswer(i + 1));
    }
    choicesWrap.appendChild(btn);
  });
  card.appendChild(choicesWrap);

  // 답안 후 해설
  if (a) {
    card.appendChild(renderExplain(q));
  }

  // 네비
  const nav = el('div', 'q-nav');
  const prevBtn = document.createElement('button');
  prevBtn.className = 'btn btn-secondary';
  prevBtn.textContent = '← 이전';
  prevBtn.disabled = state.idx === 0;
  prevBtn.addEventListener('click', goPrev);
  nav.appendChild(prevBtn);

  const right = el('div', 'right');
  const isLast = state.idx === state.exam.length - 1;
  if (isLast) {
    const finishBtn = document.createElement('button');
    finishBtn.className = 'btn btn-primary';
    finishBtn.textContent = state.isExamMode ? '시험 종료' : '결과 보기';
    finishBtn.addEventListener('click', () => finishExam(false));
    right.appendChild(finishBtn);
  } else {
    const nextBtn = document.createElement('button');
    nextBtn.className = a ? 'btn btn-primary' : 'btn btn-secondary';
    nextBtn.textContent = '다음 →';
    nextBtn.addEventListener('click', goNext);
    right.appendChild(nextBtn);
  }
  nav.appendChild(right);
  card.appendChild(nav);

  highlightCurrentCell();
}

function el(tag, cls, text) {
  const e = document.createElement(tag === 'span' ? 'span' : 'div');
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

/* 표 렌더링 */
function renderTable(b) {
  const wrap = el('div', 'data-table-wrap');
  const tbl = document.createElement('table');
  tbl.className = 'data-table';
  if (b.headers && b.headers.length) {
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    b.headers.forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      tr.appendChild(th);
    });
    thead.appendChild(tr);
    tbl.appendChild(thead);
  }
  if (b.rows && b.rows.length) {
    const tb = document.createElement('tbody');
    b.rows.forEach(row => {
      const tr = document.createElement('tr');
      row.forEach(cell => {
        const td = document.createElement('td');
        if (cell === null || cell === undefined) {
          const sp = document.createElement('span');
          sp.className = 'null-val';
          sp.textContent = 'NULL';
          td.appendChild(sp);
        } else {
          td.textContent = String(cell);
        }
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
  }
  wrap.appendChild(tbl);
  return wrap;
}

/* 코드 렌더링 + SQL 키워드 강조 */
const SQL_KEYWORDS = [
  'SELECT','FROM','WHERE','GROUP BY','HAVING','ORDER BY','JOIN','INNER','OUTER',
  'LEFT','RIGHT','FULL','CROSS','NATURAL','ON','USING','UNION ALL','UNION',
  'INTERSECT','EXCEPT','MINUS','AS','AND','OR','NOT','IN','BETWEEN','LIKE',
  'IS NOT NULL','IS NULL','IS','NULL','EXISTS','ANY','ALL','CASE','WHEN','THEN',
  'ELSE','END','INSERT','UPDATE','DELETE','MERGE','INTO','VALUES','SET',
  'COMMIT','ROLLBACK','SAVEPOINT','CREATE','ALTER','DROP','TABLE','INDEX',
  'VIEW','SEQUENCE','GRANT','REVOKE','DISTINCT','OVER','PARTITION BY',
  'PARTITION','ROWS','RANGE','CONNECT BY','START WITH','PRIOR','BY','ASC','DESC',
  'WITH','RECURSIVE','PIVOT','UNPIVOT','FOR','REFERENCES','CONSTRAINT',
  'PRIMARY KEY','FOREIGN KEY','UNIQUE','CHECK','DEFAULT','TRUNCATE',
  'ROLLUP','CUBE','GROUPING SETS','GROUPING'
];

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function highlightSql(src) {
  let s = escapeHtml(src);
  // 주석 (-- 또는 /* */)
  s = s.replace(/(--[^\n]*)/g, '$1');
  s = s.replace(/(\/\*[\s\S]*?\*\/)/g, '$1');
  // 문자열
  s = s.replace(/('(?:[^']|'')*')/g, '<span class="sql-str">$1</span>');
  // 키워드 (긴 것부터)
  const sortedKw = [...SQL_KEYWORDS].sort((a, b) => b.length - a.length);
  sortedKw.forEach(kw => {
    const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/ /g, '\\s+');
    const re = new RegExp(`(?<![\\w가-힣])(${escaped})(?![\\w가-힣])`, 'gi');
    s = s.replace(re, '<span class="sql-kw">$1</span>');
  });
  // 숫자
  s = s.replace(/(?<![\w가-힣<])(\d+(?:\.\d+)?)\b/g, '<span class="sql-num">$1</span>');
  // 빈칸 (한글 자모, 공백, 한글 짧은 표기)
  s = s.replace(/\(\s*([ㄱ-ㅎ]|[가-힣]{1,3}|\?{1,3}|[\s_]{2,})\s*\)/g, '<span class="sql-blank">($1)</span>');
  // 주석 복원
  s = s.replace(/([\s\S]*?)/g, '<span class="sql-cmt">$1</span>');
  return s;
}

function renderCode(b) {
  const pre = document.createElement('pre');
  pre.className = 'code-block';
  const code = document.createElement('code');
  code.innerHTML = highlightSql(b.content || '');
  pre.appendChild(code);
  return pre;
}

/* 4단 해설 */
function renderExplain(q) {
  const wrap = el('div', 'explain');
  if (q.exp?.reason) {
    wrap.appendChild(makeExpRow('정답 근거', q.exp.reason));
  }
  if (q.exp?.terms?.length) {
    const html = '<ul>' + q.exp.terms.map(t => `<li>${formatBold(t)}</li>`).join('') + '</ul>';
    wrap.appendChild(makeExpRow('용어', html, true));
  }
  if (q.exp?.wrongMap && Object.keys(q.exp.wrongMap).length) {
    const items = q.choices
      .map((text, i) => {
        if (i === q.ans - 1) return null;
        const reason = q.exp.wrongMap[text];
        if (!reason) return null;
        return `<li><b>${i + 1}번</b>: ${formatBold(reason)}</li>`;
      })
      .filter(Boolean);
    if (items.length) {
      wrap.appendChild(makeExpRow('오답 분석', '<ul>' + items.join('') + '</ul>', true));
    }
  }
  if (q.exp?.tip) {
    wrap.appendChild(makeExpRow('암기 팁', formatBold(q.exp.tip), true));
  }
  if (q.src) {
    const src = el('div', 'exp-source', `출처: ${q.src}${q.topic_name ? ` · 토픽 ${q.topic} ${q.topic_name}` : ''}`);
    wrap.appendChild(src);
  }
  return wrap;
}

function makeExpRow(label, contentHtml, isHtml = false) {
  const row = el('div', 'exp-row');
  row.appendChild(el('div', 'exp-label', label));
  const body = el('div', 'exp-body');
  if (isHtml) body.innerHTML = contentHtml;
  else body.innerHTML = formatBold(contentHtml);
  row.appendChild(body);
  return row;
}

function formatBold(s) {
  // **텍스트** → <b>
  let html = escapeHtml(String(s)).replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  // (가)/(나)/(다)/(라)/(마)/(바) 항목 도입부 앞에 줄바꿈
  // 단, "(가)와", "(가)를", "(가)만", "(가) 형태" 처럼 본문 언급은 제외.
  // 휴리스틱: 마침표 또는 콜론 직후 + 공백 + (한글) → 새 항목으로 간주
  html = html.replace(
    /([.:;])\s+(\([가-바]\))/g,
    '$1<br>$2'
  );
  return html;
}

/* 답안 선택 */
function selectAnswer(num) {
  if (state.ended) return;
  if (state.answered[state.idx]) return;
  const q = state.exam[state.idx];
  const correct = num === q.ans;
  state.answered[state.idx] = { selected: num, correct };
  // 오답 노트 갱신
  if (!correct) {
    wrongNotes.add(q.id);
    saveSet(STORAGE.wrongNotes, wrongNotes);
  } else if (wrongNotes.has(q.id) && state.mode === 'wrong') {
    wrongNotes.delete(q.id);
    saveSet(STORAGE.wrongNotes, wrongNotes);
  }
  renderQuiz();
  updateGridCell(state.idx);
}

function updateRate() {
  const ans = state.answered.filter(a => a !== null);
  if (ans.length === 0) {
    document.getElementById('rate').textContent = '—';
    return;
  }
  const correct = ans.filter(a => a.correct).length;
  const r = Math.round(correct / ans.length * 100);
  document.getElementById('rate').textContent = `${r}%`;
}

function goNext() {
  if (state.idx < state.exam.length - 1) {
    state.idx++;
    renderQuiz();
  }
}
function goPrev() {
  if (state.idx > 0) {
    state.idx--;
    renderQuiz();
  }
}

/* 북마크 */
function updateBookmarkBtn() {
  const q = state.exam[state.idx];
  const btn = document.getElementById('bookmark-btn');
  btn.classList.toggle('active', bookmarks.has(q.id));
  btn.textContent = bookmarks.has(q.id) ? '★' : '☆';
}

document.getElementById('bookmark-btn').addEventListener('click', () => {
  const q = state.exam[state.idx];
  if (bookmarks.has(q.id)) {
    bookmarks.delete(q.id);
    toast('북마크 해제');
  } else {
    bookmarks.add(q.id);
    toast('북마크 추가');
  }
  saveSet(STORAGE.bookmarks, bookmarks);
  updateBookmarkBtn();
  updateGridCell(state.idx);
});

/* ════════════ 답안지 격자 ════════════ */
function renderGrid() {
  const grid = document.getElementById('grid-50');
  grid.innerHTML = '';
  state.exam.forEach((q, i) => {
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.dataset.i = i;
    cell.textContent = i + 1;
    cell.addEventListener('click', () => {
      state.idx = i;
      renderQuiz();
    });
    grid.appendChild(cell);
  });
  document.getElementById('grid-title').textContent = `답안지 ${state.idx + 1} / ${state.exam.length}`;
  document.getElementById('grid-legend').innerHTML = `
    <span><i class="ok"></i>정답</span>
    <span><i class="no"></i>오답</span>
    <span><i></i>미응답</span>
    <span><i class="c"></i>현재</span>
  `;
  state.exam.forEach((_, i) => updateGridCell(i, false));
  highlightCurrentCell();
}

function updateGridCell(i, alsoHighlight = true) {
  const cell = document.querySelector(`#grid-50 .cell[data-i="${i}"]`);
  if (!cell) return;
  cell.className = 'cell';
  const a = state.answered[i];
  const q = state.exam[i];
  // 즉시 피드백 모드: 답 고른 셀은 채점 결과 색(초록/빨강), 미응답은 회색
  if (a == null) {
    // 미응답 — 기본 외곽 (현재 셀이면 액센트 별도 처리)
  } else if (a.correct) {
    cell.classList.add('ok');
  } else {
    cell.classList.add('no');
  }
  if (q && bookmarks.has(q.id)) cell.classList.add('bookmark');
  if (alsoHighlight) highlightCurrentCell();
}

function highlightCurrentCell() {
  document.querySelectorAll('#grid-50 .cell').forEach((c, i) => {
    c.classList.toggle('current', i === state.idx);
  });
  document.getElementById('grid-title').textContent = `답안지 ${state.idx + 1} / ${state.exam.length}`;
}

/* ════════════ 종료 / 결과 ════════════ */
function finishExam(timeUp) {
  if (state.ended) return;
  if (!timeUp) {
    const unanswered = state.answered.filter(a => a == null).length;
    if (unanswered > 0) {
      const ok = confirm(`안 푼 문제가 ${unanswered}개 있습니다. 종료하시겠습니까?`);
      if (!ok) return;
    }
  }
  state.ended = true;
  stopTimer();
  // 누적 통계 갱신
  const correct = state.answered.filter(a => a?.correct).length;
  const total = state.exam.length;
  const stats = loadJSON(STORAGE.stats, { attempts: 0, totalQ: 0, totalCorrect: 0 });
  stats.attempts++;
  stats.totalQ += total;
  stats.totalCorrect += correct;
  saveJSON(STORAGE.stats, stats);
  showResult();
}

function showResult() {
  const total = state.exam.length;
  const correct = state.answered.filter(a => a?.correct).length;
  let scoreNum, passTag, subjHtml;
  if (state.isExamMode) {
    // SQLD: 1문항 = 2점. 1과목 20점 만점, 2과목 80점 만점, 총 100점.
    // 합격: 총 60점 이상 + 1과목 8점 이상(40%) + 2과목 32점 이상(40%).
    const s1 = state.exam.filter(q => q.subj === 1);
    const s2 = state.exam.filter(q => q.subj === 2);
    const c1 = s1.filter(q => state.answered[state.exam.indexOf(q)]?.correct).length;
    const c2 = s2.filter(q => state.answered[state.exam.indexOf(q)]?.correct).length;
    const p1 = c1 * 2;            // 1과목 점수
    const p2 = c2 * 2;            // 2과목 점수
    const score = p1 + p2;        // 총점
    const fail1 = p1 < 8;          // 1과목 과락
    const fail2 = p2 < 32;         // 2과목 과락
    const pass = score >= 60 && !fail1 && !fail2;
    scoreNum = score;
    let reason = '';
    if (!pass) {
      const reasons = [];
      if (score < 60) reasons.push('총점 60점 미만');
      if (fail1) reasons.push('1과목 과락');
      if (fail2) reasons.push('2과목 과락');
      reason = ` <span style="font-size:0.75rem;font-weight:500;margin-left:4px;opacity:.85;">(${reasons.join(', ')})</span>`;
    }
    passTag = pass
      ? '<span class="pass-tag ok">합격</span>'
      : `<span class="pass-tag no">불합격${reason}</span>`;
    subjHtml = `
      <div class="subj-row ${fail1 ? 'fail' : ''}">
        <div class="lbl">1과목 데이터 모델링의 이해 <span style="color:var(--text-mute);font-size:0.75rem;">(과락 8점)</span></div>
        <div class="frac mono">${p1} / 20점</div>
        <div class="pct mono">${c1}/${s1.length}문</div>
      </div>
      <div class="subj-row ${fail2 ? 'fail' : ''}">
        <div class="lbl">2과목 SQL 기본 및 활용 <span style="color:var(--text-mute);font-size:0.75rem;">(과락 32점)</span></div>
        <div class="frac mono">${p2} / 80점</div>
        <div class="pct mono">${c2}/${s2.length}문</div>
      </div>
    `;
  } else {
    const pct = total ? Math.round(correct / total * 100) : 0;
    scoreNum = pct;
    passTag = `<span class="pass-tag ${pct >= 60 ? 'ok' : 'no'}">정답률</span>`;
    const labelMap = { topic: '영역별 학습', bookmark: '북마크 복습', wrong: '오답 노트' };
    subjHtml = `
      <div class="subj-row">
        <div class="lbl">${labelMap[state.mode] || '학습'}</div>
        <div class="frac mono">${correct} / ${total}</div>
        <div class="pct mono">${pct.toFixed(1)}%</div>
      </div>
    `;
  }
  document.getElementById('score-num').textContent = scoreNum;
  document.getElementById('pass-tag').outerHTML = passTag.replace('<span ', '<span id="pass-tag" ');
  document.getElementById('subj-scores').innerHTML = subjHtml;
  saveJSON(STORAGE.lastResult, { score: scoreNum, at: Date.now() });
  // 결과 격자
  renderResultGrid();
  showScreen('result');
}

function renderResultGrid() {
  const grid = document.getElementById('result-grid');
  grid.innerHTML = '';
  state.exam.forEach((q, i) => {
    const a = state.answered[i];
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.textContent = i + 1;
    if (a == null) cell.classList.add('miss');
    else if (a.correct) cell.classList.add('ok');
    else cell.classList.add('no');
    if (bookmarks.has(q.id)) cell.classList.add('bookmark');
    cell.addEventListener('click', () => {
      state.reviewFilter = 'all';
      showReview(i);
    });
    grid.appendChild(cell);
  });
}

document.getElementById('goto-review').addEventListener('click', () => showReview());
document.getElementById('goto-retry').addEventListener('click', () => {
  if (state.mode === 'exam') {
    const exam = buildExam();
    startSession({ mode: 'exam', exam, isExamMode: true, durationSec: 90 * 60 });
  } else {
    showScreen('home');
    renderHome();
  }
});
document.getElementById('goto-home').addEventListener('click', () => {
  showScreen('home');
  renderHome();
});
document.getElementById('review-home').addEventListener('click', () => {
  showScreen('home');
  renderHome();
});

/* ════════════ REVIEW ════════════ */
function showReview(scrollToIdx) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('on', b.dataset.filter === state.reviewFilter));
  renderReviewList();
  showScreen('review');
  if (scrollToIdx != null) {
    setTimeout(() => {
      const target = document.querySelector(`#review-list [data-i="${scrollToIdx}"]`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.reviewFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('on', b === btn));
    renderReviewList();
  });
});

function renderReviewList() {
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  let items = state.exam.map((q, i) => ({ q, a: state.answered[i], i }));
  if (state.reviewFilter === 'wrong') {
    items = items.filter(x => x.a == null || !x.a.correct);
  } else if (state.reviewFilter === 'bookmark') {
    items = items.filter(x => bookmarks.has(x.q.id));
  }
  document.getElementById('review-count').textContent = `(${items.length}/${state.exam.length})`;
  if (items.length === 0) {
    const empty = el('div', 'empty', state.reviewFilter === 'wrong' ? '오답이 없습니다' : '북마크가 없습니다');
    list.appendChild(empty);
    return;
  }
  items.forEach(({ q, a, i }) => {
    const item = el('div', 'review-item');
    item.dataset.i = i;
    if (a == null) item.classList.add('miss');
    else if (a.correct) item.classList.add('ok');
    else item.classList.add('no');

    const head = el('div', 'review-head');
    const left = el('div', 'left');
    left.appendChild(el('div', 'num', `${String(i + 1).padStart(2, '0')} / ${state.exam.length}`));
    left.appendChild(el('div', 'topic', `${q.subj}과목 · ${q.topic_name || ''}`));
    head.appendChild(left);
    let verdict;
    if (a == null) verdict = '<span class="verdict miss">미응답</span>';
    else if (a.correct) verdict = '<span class="verdict ok">정답</span>';
    else verdict = '<span class="verdict no">오답</span>';
    const verdictEl = document.createElement('div');
    verdictEl.innerHTML = verdict;
    head.appendChild(verdictEl.firstChild);
    item.appendChild(head);

    const body = el('div', 'q-body');
    body.style.marginBottom = 'var(--s-3)';
    body.textContent = q.q || '';
    item.appendChild(body);

    if (q.blocks && q.blocks.length) {
      const wrap = el('div', 'blocks');
      q.blocks.forEach(b => {
        const bEl = el('div', '');
        if (b.title) bEl.appendChild(el('div', 'block-title', b.title));
        if (b.type === 'table') bEl.appendChild(renderTable(b));
        else if (b.type === 'code') bEl.appendChild(renderCode(b));
        wrap.appendChild(bEl);
      });
      item.appendChild(wrap);
    }

    const choicesWrap = el('div', 'choices');
    choicesWrap.style.marginTop = 'var(--s-3)';
    q.choices.forEach((text, ci) => {
      const num = ci + 1;
      const btn = document.createElement('button');
      btn.className = 'choice locked';
      const numEl = el('span', 'num', String(num));
      const txtEl = el('span', '', text);
      btn.appendChild(numEl);
      btn.appendChild(txtEl);
      const isAns = num === q.ans;
      const isPicked = a && num === a.selected;
      if (isAns) btn.classList.add('correct');
      else if (isPicked) btn.classList.add('wrong');
      else btn.classList.add('dim');
      if (isPicked && !isAns) {
        const tag = document.createElement('span');
        tag.className = 'your-pick';
        tag.textContent = '내 답';
        txtEl.appendChild(tag);
      }
      choicesWrap.appendChild(btn);
    });
    item.appendChild(choicesWrap);

    item.appendChild(renderExplain(q));
    list.appendChild(item);
  });
}

/* ════════════ 답안지 / 종료 / 도움말 ════════════ */
document.getElementById('grid-btn').addEventListener('click', () => {
  document.getElementById('answer-panel').classList.toggle('open');
});
document.getElementById('answer-toggle-m').addEventListener('click', () => {
  document.getElementById('answer-panel').classList.toggle('open');
});
document.getElementById('exit-btn').addEventListener('click', () => {
  if (!state.ended) {
    const ok = confirm('시험을 종료하고 홈으로 돌아가시겠습니까? 진행 상황은 저장되지 않습니다.');
    if (!ok) return;
  }
  state.ended = true;
  stopTimer();
  showScreen('home');
  renderHome();
});

/* ════════════ 테마 / 폰트 ════════════ */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem(STORAGE.theme, t);
  document.querySelectorAll('#theme-toggle-group button').forEach(b => {
    b.classList.toggle('on', b.dataset.t === t);
  });
}
function applyFont(size) {
  // 'sm' | 'md' | 'lg'
  document.documentElement.classList.remove('font-sm', 'font-lg');
  if (size === 'sm') document.documentElement.classList.add('font-sm');
  else if (size === 'lg') document.documentElement.classList.add('font-lg');
  localStorage.setItem(STORAGE.font, size);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
function stepFont() {
  const order = ['sm', 'md', 'lg'];
  const cur = localStorage.getItem(STORAGE.font) || 'md';
  const next = order[(order.indexOf(cur) + 1) % order.length];
  applyFont(next);
  toast(`글자 크기: ${{ sm: '작게', md: '보통', lg: '크게' }[next]}`);
}

document.getElementById('theme-toggle-group').addEventListener('click', e => {
  const btn = e.target.closest('button[data-t]');
  if (!btn) return;
  applyTheme(btn.dataset.t);
});
document.getElementById('theme-btn').addEventListener('click', toggleTheme);
document.getElementById('font-stepper').addEventListener('click', stepFont);
document.getElementById('font-btn').addEventListener('click', stepFont);

/* ════════════ 키보드 ════════════ */
document.addEventListener('keydown', e => {
  if (e.target.matches('input, select, textarea')) return;
  if (!document.getElementById('quiz').classList.contains('active')) return;
  if (e.key >= '1' && e.key <= '4') {
    selectAnswer(parseInt(e.key, 10));
  } else if (e.key === 'ArrowLeft') {
    goPrev();
  } else if (e.key === 'ArrowRight') {
    goNext();
  } else if (e.key === 'b' || e.key === 'B') {
    document.getElementById('bookmark-btn').click();
  } else if (e.key === 'g' || e.key === 'G') {
    document.getElementById('grid-btn').click();
  } else if (e.key === '?') {
    toast('1~4 답 / ←→ 이동 / b 북마크 / g 답안지');
  }
});

/* ════════════ 토스트 ════════════ */
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ════════════ 초기화 ════════════ */
applyTheme(localStorage.getItem(STORAGE.theme) || 'dark');
applyFont(localStorage.getItem(STORAGE.font) || 'md');
renderHome();

</script>
